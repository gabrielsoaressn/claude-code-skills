<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code Skills | Gabriel Soares</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Paleta Sóbria e Profissional */
            --bg-body: #fafafa;
            --bg-card: #ffffff;
            --text-main: #111111;
            --text-muted: #555555;
            --accent: #2d3436; /* Preto suave para elementos de destaque */
            --accent-hover: #000000;
            --border: #e0e0e0;
            
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-subtle: 0 2px 5px rgba(0,0,0,0.03);
            --shadow-hover: 0 10px 30px rgba(0,0,0,0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
        }

        /* Layout Container */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Header Minimalista */
        header {
            padding: 4rem 0 3rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 4rem;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1.site-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: var(--accent);
        }

        .repo-link {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 20px;
        }

        .repo-link:hover {
            border-color: var(--accent);
            color: var(--accent);
            background-color: #fff;
